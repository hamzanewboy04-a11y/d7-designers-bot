<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'D7 Админка' }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>D7 Админка</h1>
      <div class="subtitle">Внутренняя панель отчётности и выплат</div>
      <nav>
        <a href="/admin">Главная</a>
        <a href="/admin/employees">Сотрудники</a>
        <a href="/admin/legacy-reports">Legacy-отчёты</a>
        <a href="/admin/legacy-daily">Отчёты за день</a>
        <a href="/admin/smm/assignments">SMM-назначения</a>
        <a href="/admin/reviewer/entries">Очередь отзовиков</a>
        <a href="/admin/payouts">Выплаты</a>
      </nav>
      {% if operator_id|default(None) %}
      <div class="sidebar-footer">
        <div class="subtitle">Оператор: {{ operator_id }}</div>
        <form method="post" action="/admin/logout">
          <button class="button secondary" type="submit">Выйти</button>
        </form>
      </div>
      {% endif %}
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
